name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Generar un .env temporal para la build de GitHub Actions usando GitHub Secrets si estuvieran configurados, 
      # o simplemente inyectando variables de entorno en el build command. 
      # IMPORTANTE: Como GitHub Pages expone el frontend, las variables VITE_ de Firebase deben estar disponibles en el build.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        # Nota: Idealmente deberías usar GitHub Secrets para no exponer esto en el archivo YAML, 
        # pero al ser Firebase frontend, es información pública de todos modos.
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
